name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.HOSTINGER_APP_DIR }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing dependencies..."
            npm ci --omit=dev

            echo "==> Building VoxCode..."
            npm run build

            echo "==> Restarting PM2..."
            pm2 restart voxcode || pm2 start server.js --name voxcode --update-env

            pm2 save
            echo "==> Done! VoxCode is live."
